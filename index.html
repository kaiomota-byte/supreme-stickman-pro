<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Combat Evolved</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="ui-layer">
        <div id="main-menu" class="menu-screen">
            <h1>STICKMAN COMBAT EVOLVED</h1>
            
            <div class="customizer-panel">
                <div class="setup-block">
                    <h3>Jogador 1 (Você)</h3>
                    <label>Cor do Personagem:
                        <select id="p1-color">
                            <option value="#ef4444" selected>Vermelho Rápido</option>
                            <option value="#22c55e">Verde Tóxico</option>
                            <option value="#eab308">Amarelo Elétrico</option>
                            <option value="#3b82f6">Azul Sônico</option>
                        </select>
                    </label>
                    <label>Sua Arma: 
                        <select id="p1-weapon-select">
                            <optgroup label="Combate Corporal (Melee)">
                                <option value="sword">Espada de Cavaleiro</option>
                                <option value="katana" selected>Katana de Ferro</option>
                                <option value="machado">Machado de Guerra</option>
                                <option value="martelo">Martelo de Arremesso</option>
                                <option value="motosserra">Motosserra Industrial</option>
                                <option value="bastao_eletrico">Bastão de Choque</option>
                            </optgroup>
                            <optgroup label="Disparos Físicos (Ranged)">
                                <option value="pistola">Pistola Tática</option>
                                <option value="revolver">Revólver .38 Magnum</option>
                                <option value="escopeta">Escopeta Cano Duplo</option>
                                <option value="rifle">Rifle de Assalto</option>
                                <option value="sniper">Fuzil Sniper</option>
                                <option value="lança_foguetes">Lança-Foguetes RPG</option>
                            </optgroup>
                            <optgroup label="Tecnologia Sci-Fi">
                                <option value="laser_rifle">Rifle de Energia</option>
                                <option value="canhao_orbitais">Canhão Desintegrador</option>
                            </optgroup>
                        </select>
                    </label>
                </div>

                <div class="setup-block">
                    <h3>Oponente (Inimigo)</h3>
                    <label>Nível da IA: 
                        <select id="ai-difficulty">
                            <option value="easy">Fácil</option>
                            <option value="medium" selected>Médio</option>
                            <option value="hard">Difícil</option>
                            <option value="extreme">Extremo</option>
                        </select>
                    </label>
                    <label>Arma do Oponente: 
                        <select id="p2-weapon-select">
                            <option value="sword">Espada de Cavaleiro</option>
                            <option value="katana">Katana de Ferro</option>
                            <option value="motosserra" selected>Motosserra Industrial</option>
                            <option value="escopeta">Escopeta Cano Duplo</option>
                            <option value="lança_foguetes">Lança-Foguetes RPG</option>
                        </select>
                    </label>
                </div>
            </div>

            <div class="menu-buttons">
                <button onclick="Menu.startMatch('ai')">COMBATE VS IA</button>
                <button onclick="Menu.startMatch('local')" class="btn-secondary">MULTIPLAYER LOCAL (W-A-S-D / Setas)</button>
                <div id="currency-display">Saldo em Conta: $<span id="coin-count">0</span></div>
            </div>
        </div>

        <div id="game-hud" class="hidden">
            <div class="hud-player" id="hud-p1">
                <div class="name">JOGADOR 1</div>
                <div class="hp-bar"><div id="hp-p1" class="hp-fill"></div></div>
            </div>
            <button class="btn-abort" onclick="Menu.quitMatch()">ABORTAR BATALHA</button>
            <div class="hud-player" id="hud-p2">
                <div class="name" id="p2-tag">INIMIGO</div>
                <div class="hp-bar"><div id="hp-p2" class="hp-fill"></div></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" style="display: none;"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <script type="module">
        import { Menu } from './js/menu.js';
        window.Menu = Menu; 
        
        document.addEventListener('DOMContentLoaded', () => {
            window.Menu.init();
        });
    </script>
</body>
</html>
