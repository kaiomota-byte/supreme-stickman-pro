<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Combat Evolved</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="ui-layer">
        <div id="main-menu" class="menu-screen">
            <h1>STICKMAN COMBAT EVOLVED</h1>
            
            <div style="display:flex; gap:20px; margin-bottom:25px; background:rgba(255,255,255,0.05); padding:15px; border-radius:10px;">
                <label>Arma P1: 
                    <select id="p1-weapon-select">
                        <option value="katana" selected>Katana</option>
                        <option value="motosserra">Motosserra</option>
                        <option value="martelo">Martelo de Guerra</option>
                        <option value="pistola">Pistola 9mm</option>
                        <option value="escopeta">Escopeta Calibre 12</option>
                        <option value="lança_foguetes">Lança Foguetes</option>
                        <option value="laser_rifle">Rifle Laser</option>
                    </select>
                </label>
                <label>Arma P2/IA: 
                    <select id="p2-weapon-select">
                        <option value="sword">Espada</option>
                        <option value="machado">Machado</option>
                        <option value="bastao_eletrico">Bastão de Choque</option>
                        <option value="revolver">Revólver .38</option>
                        <option value="sniper">Sniper de Precisão</option>
                        <option value="granada">Granada</option>
                        <option value="canhao_orbitais">Canhão Orbital</option>
                    </select>
                </label>
            </div>

            <div class="menu-buttons">
                <button onclick="window.Menu.changeScreen('modes')">JOGAR (vs IA)</button>
                <button onclick="window.Menu.startLocalMatch()">MULTIPLAYER LOCAL</button>
                <button onclick="window.Menu.changeScreen('shop')">LOJA & ARSENAL</button>
                <button onclick="window.Menu.changeScreen('settings')">CONFIGURAÇÕES</button>
            </div>
            <div id="currency-display">Moedas: $<span id="coin-count">0</span></div>
        </div>

        <div id="modes-menu" class="menu-screen hidden">
            <h2>MODO SOLO</h2>
            <button onclick="window.Menu.startMatch('ai')">DUELO CONTRA IA</button>
            <button onclick="window.Menu.changeScreen('main')">VOLTAR</button>
        </div>

        <div id="shop-menu" class="menu-screen hidden">
            <h2>LOJA</h2>
            <div class="shop-grid">
                <button onclick="window.Menu.buyItem('skin_gold', 500)">Skin Dourada ($500)</button>
            </div>
            <button onclick="window.Menu.changeScreen('main')">VOLTAR</button>
        </div>

        <div id="settings-menu" class="menu-screen hidden">
            <h2>CONFIGURAÇÕES</h2>
            <label>Dificuldade da IA: 
                <select id="ai-difficulty">
                    <option value="easy">Fácil</option>
                    <option value="medium" selected>Médio</option>
                    <option value="hard">Difícil</option>
                </select>
            </label>
            <br><br>
            <button onclick="window.Menu.changeScreen('main')">SALVAR</button>
        </div>

        <div id="game-hud" class="hidden">
            <div class="hud-player" id="hud-p1">
                <div class="name">JOGADOR 1</div>
                <div class="hp-bar"><div id="hp-p1" class="hp-fill"></div></div>
            </div>
            
            <button onclick="window.Menu.changeScreen('main')" style="padding:5px 15px; background:#ff3b30; font-size:12px; pointer-events:auto;">SAIR DA PARTIDA</button>
            
            <div class="hud-player" id="hud-p2">
                <div class="name" id="p2-name">BOT / P2</div>
                <div class="hp-bar"><div id="hp-p2" class="hp-fill"></div></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" style="display: none;"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script type="module" src="js/game.js"></script>
</body>
</html>
